model:
  name: top3_case
  version: v2.1
  format: graph-friendly
  source_of_truth: working/agent-top3pm/preview/data-model-top3-workflow-v2.1.md

entities:
  - name: Top3Case
    key: caseId
    properties:
      - caseId
      - title
      - caseCategory
      - ETA
      - status
      - severity
      - createdAt
      - updatedAt
      - mantisUrl
      - description
      - caseSummary
      - customerName
      - pmOwnerId
      - qaOwnerId
      - devOwnerId
      - supportOwnerIds
      - branch
      - hardwareModels
      - currentPhase
      - currentPhaseSource
      - currentPhaseEvidenceNoteId
      - closedAt
      - closureReason
  - name: NFR
    key: nfrId
    properties:
      - nfrId
      - product
      - solution
      - summary
      - description
      - severity
      - reporterId
      - dateSubmitted
      - lastUpdate
      - eta
      - affectedCustomer
      - salesforceOppIds
      - salesforceAccountIds
      - additionalInformation
      - conclusion
      - status
  - name: Issue
    key: issueId
    properties:
      - issueId
      - title
      - description
      - category
      - severity
      - reproducibility
      - reporterId
      - keyword
      - reproducedById
      - reportedVersion
      - earliestBuildNumber
      - referredIssueIds
      - duplicateIssueId
      - assignedDevId
      - qaAssigneeId
      - fixSchedule
      - resolvedIn
      - conclusion
      - status
  - name: BugNote
    key: bugNoteId
    properties:
      - bugNoteId
      - ticketId
      - authorDisplay
      - headlineType
      - headlineRaw
      - rawNote
      - rawHtml
      - rawText
      - noteKind
      - mentionedMantisIds
      - mentionedTicketIds
      - phabTaskIds
      - createdAt
      - extractAt
      - bugNoteEditUrl
      - bugNoteDeleteUrl
  - name: ActionHistory
    key: actionId
    properties: [actionId, caseId, actorId, actionType, actionAt, note, sourceSystem, rawRef]
  - name: BranchRequest
    key: branchRequestId
    properties:
      - branchRequestId
      - GITLAB_TOP_LEVEL_GROUP
      - GITLAB_PROJECT
      - MAJOR_VERSION
      - MINOR_VERSION
      - NEW_BRANCH_NAME
      - BRANCH_POINT
      - BRANCH_TYPE
      - BRANCH_DESCRIPTION
      - FOR_CUSTOMER
      - DEV_LEAD
      - PM_LEAD
      - requestStatus
      - requestedAt
  - name: Branch
    key: branchName
    properties: [branchName, createdAt, sourceBranchRequestId]
  - name: BuildRequestPage
    key: buildRequestPageId
    properties: [buildRequestPageId, pageUrl, jobPath, buttonLabel]
  - name: BuildRequest
    key: buildRequestId
    properties:
      - buildRequestId
      - requestedAt
      - requestStatus
      - selectedCombinations
      - RUN_DB_UPDATE
      - APPEND_MODEL_NAME
      - TRIAL
      - MATURITY
      - SA
      - SA_PATCH_VERSION
  - name: BuildRun
    key: buildId
    properties: [buildId, buildTag, result, triggeredAt, notifiedAt, notificationRef]
  - name: Artifact
    key: artifactId
    properties: [artifactId, artifactPath, artifactType, publishedAt]
  - name: PhabricatorTask
    key: phabTaskId
    properties:
      - phabTaskId
      - phabUrl
      - top3CaseId
      - title
      - status
      - assignedToId
      - updatedAt
      - lastCheckedAt
      - lastStatus
      - latestCommentAt
      - latestCommentBy
      - latestCommentSummary
      - latestChecklistUrls
      - latestChecklistNames
      - checklistSyncedToTop3At
      - checklistSyncState
      - checklistSyncError
  - name: ValidationRecord
    key: validationId
    properties: [validationId, environment, reproSteps, observedResult, expectedResult, validationStatus, evidenceLink]
  - name: ReleaseNote
    key: releaseNoteId
    properties: [releaseNoteId, content, author, createdAt]
  - name: Person
    key: personId
    properties: [personId, name, roleType]
  - name: Team
    key: teamId
    properties: [teamId, teamType, channelRef]
  - name: CommunicationThread
    key: threadId
    properties: [threadId, platform, topic, createdAt]

relations:
  - id: r01
    type: hasNFR
    from: Top3Case
    to: NFR
    cardinality: 1..*
  - id: r02
    type: hasIssue
    from: Top3Case
    to: Issue
    cardinality: 0..*
  - id: r03
    type: ownedBy
    from: Top3Case
    to: Person
    role: PM
    cardinality: 1..1
  - id: r04
    type: hasParticipant
    from: Top3Case
    to: Person
  - id: r05
    type: hasTeam
    from: Top3Case
    to: Team
    cardinality: 2..2
  - id: r06
    type: hasQaOwner
    from: Top3Case
    to: Person
    role: QA
    cardinality: 0..1
  - id: r07
    type: hasDevOwner
    from: Top3Case
    to: Person
    role: Dev
    cardinality: 0..1
  - id: r08
    type: hasSupportOwner
    from: Top3Case
    to: Person
    role: Support
    cardinality: 0..*
  - id: r09
    type: hasBugNote
    from: Top3Case
    to: BugNote
    cardinality: 0..*
  - id: r10
    type: hasActionHistory
    from: Top3Case
    to: ActionHistory
    cardinality: 0..*
  - id: r11
    type: references
    from: BugNote
    to: Top3Case
    cardinality: 0..*
  - id: r12
    type: references
    from: BugNote
    to: NFR
    cardinality: 0..*
  - id: r13
    type: references
    from: BugNote
    to: Issue
    cardinality: 0..*
  - id: r31
    type: references
    from: BugNote
    to: PhabricatorTask
    cardinality: 0..*
  - id: r32
    type: authoredBy
    from: BugNote
    to: Person
    cardinality: 1..1
  - id: r14
    type: usesThread
    from: Team
    to: CommunicationThread
  - id: r15
    type: submitsBranchRequest
    from: Person
    role: PM
    to: BranchRequest
  - id: r16
    type: targets
    from: BranchRequest
    to: Top3Case
  - id: r17
    type: resultsIn
    from: BranchRequest
    to: Branch
    cardinality: 0..1
  - id: r18
    type: hasDevLead
    from: Branch
    to: Person
    role: Dev
    cardinality: 1..1
  - id: r19
    type: hasPmLead
    from: Branch
    to: Person
    role: PM
    cardinality: 1..1
  - id: r20
    type: exposesBuildEntry
    from: Branch
    to: BuildRequestPage
    cardinality: 1..1
  - id: r21
    type: submitsBuildRequest
    from: Person
    role: PM|Dev
    to: BuildRequest
  - id: r22
    type: openedFrom
    from: BuildRequest
    to: BuildRequestPage
  - id: r23
    type: usesBranch
    from: BuildRequest
    to: Branch
  - id: r24
    type: spawns
    from: BuildRequest
    to: BuildRun
    cardinality: 0..*
  - id: r25
    type: publishesArtifact
    from: BuildRun
    to: Artifact
    cardinality: 1..*
  - id: r26
    type: validates
    from: ValidationRecord
    to: BuildRun
  - id: r27
    type: validatesIssue
    from: ValidationRecord
    to: Issue
  - id: r28
    type: trackedIn
    from: ValidationRecord
    to: PhabricatorTask
  - id: r29
    type: summarizes
    from: ReleaseNote
    to: ValidationRecord
  - id: r30
    type: publishesDeliverable
    from: Top3Case
    to: ReleaseNote
    cardinality: 0..*
  - id: r33
    type: assignedTo
    from: PhabricatorTask
    to: Person
    cardinality: 0..1
  - id: r34
    type: authoredBy
    from: PhabricatorTask
    to: Person
    cardinality: 0..1
  - id: r35
    type: linkedTo
    from: PhabricatorTask
    to: Top3Case
    cardinality: 1..1
  - id: r36
    type: linksTo
    from: Issue
    to: Issue
    cardinality: 0..*
  - id: r37
    type: duplicateOf
    from: Issue
    to: Issue
    cardinality: 0..1
  - id: r38
    type: fixedBy
    from: Issue
    to: Person
    role: Dev
    cardinality: 0..1
  - id: r39
    type: hasQaAssignee
    from: Issue
    to: Person
    role: QA
    cardinality: 0..1
  - id: r40
    type: hasBugNote
    from: Issue
    to: BugNote
    cardinality: 0..*

link_keys:
  - Top3Case.caseId = Mantis bug_id
  - NFR.nfrId = Mantis bug_id (NFR)
  - NFR.product = Mantis Product field (e.g., [NFR] FortiOS)
  - NFR.solution = Mantis Solution field
  - NFR.summary = Mantis Summary field
  - NFR.reporterId = normalized account id from Mantis Reporter
  - NFR.affectedCustomer = Mantis Affected Customer field
  - NFR.salesforceOppIds / NFR.salesforceAccountIds = Mantis Salesforce ID fields
  - NFR.conclusion = AI-agent composed NFR conclusion synthesized from full NFR ticket evidence
  - Issue.issueId = Mantis bug_id (bug-fix)
  - Issue.hasBugNote->BugNote is keyed by issue bug_id parent context + bugnote id
  - Issue.referredIssueIds = parsed linked BugNote.rawText from Issue.hasBugNote using #id/mantis#id/bug_id=id
  - Issue.linksTo->Issue resolves from Issue.referredIssueIds after issue-type filtering
  - Issue.duplicateIssueId = Mantis Duplicate ID field
  - Issue.duplicateOf->Issue resolves from Issue.duplicateIssueId when present
  - Issue.assignedDevId = normalized account id from Mantis Assigned To
  - Issue.qaAssigneeId = normalized account id from Mantis QA Assignee
  - Issue.category = Mantis Category field
  - Issue.severity = Mantis Severity field
  - Issue.reproducibility = Mantis Reproducibility field
  - Issue.reporterId = normalized account id from Mantis Reporter
  - Issue.keyword = Mantis Keyword field
  - Issue.reproducedById = normalized account id from Mantis Reproduced By
  - Issue.reportedVersion = Mantis Reported Version field
  - Issue.earliestBuildNumber = Mantis Earliest Build Number field
  - Issue.fixSchedule = Mantis Fix Schedule field
  - Issue.resolvedIn = Mantis Resolved In field
  - Issue.conclusion = AI-agent composed issue conclusion synthesized from full issue ticket evidence
  - Issue.assignedDevId/qaAssigneeId are denormalized snapshots; Issue.fixedBy/hasQaAssignee are canonical relations
  - BugNote.bugNoteId = Mantis bugnote id
  - BugNote.references->Top3Case is keyed by BugNote.ticketId (Mantis bug_id parent context)
  - BugNote.mentionedMantisIds = extracted #mantisId list
  - BugNote.mentionedTicketIds = extracted ticket references from #id/mantis#id/bug_id=id
  - BugNote.references->NFR|Issue resolves from mentionedTicketIds by Mantis ticket lookup/type mapping
  - BugNote.phabTaskIds = resolved from Phabricator search using Top3Case.caseId + QA identity
  - BugNote.references->PhabricatorTask resolves from BugNote.phabTaskIds
  - BugNote.authoredBy->Person maps bugnote header account id to Person.personId
  - BugNote shortcut URLs are derived from bugNoteId and ticketId (edit/delete)
  - PhabricatorTask.phabTaskId = task key in form T<id>
  - PhabricatorTask.top3CaseId = mapped from Phab Mantis IDs field to Top3Case.caseId
  - PhabricatorTask.assignedToId is denormalized snapshot; PhabricatorTask.assignedTo is canonical relation
  - Person.personId uses unique company account id (e.g., sjeff)
  - BranchRequest.NEW_BRANCH_NAME -> Branch.branchName (on success)
  - Branch.branchName links Mantis/Phab/Jenkins contexts
  - BuildRun.buildId|buildTag links Jenkins->Outlook->InfoSite
  - Artifact.artifactPath = InfoSite retrieval key
  - Team.channelRef + CommunicationThread.threadId = Teams channel identity

derivation_rules:
  - name: currentPhase_derivation
    target: Top3Case.currentPhase
    rule: derive from BugNote.headlineType and note content cues using latest/high-confidence notes
    provenance_fields:
      - Top3Case.currentPhaseSource
      - Top3Case.currentPhaseEvidenceNoteId
  - name: closedAt_derivation
    target: Top3Case.closedAt
    rule: set from BugNote.createdAt where headlineRaw in ["---Release---", "---Close---"] per preview/bugnote-headlines.md
  - name: closureReason_derivation
    target: Top3Case.closureReason
    rule: AI Agent infers and composes normalized closure reason from final state plus release/close bugnote evidence
    confirmation: HPO_CONFIRMED
  - name: nfr_conclusion_derivation
    target: NFR.conclusion
    rule: AI Agent infers and composes a concise NFR conclusion from summary/description, additional information, and current status context
    inputs:
      - NFR.summary
      - NFR.description
      - NFR.additionalInformation
      - NFR.status
    confirmation: HPO_CONFIRMED
  - name: issue_referredIssueIds_derivation
    target: Issue.referredIssueIds
    rule: parse linked Issue.hasBugNote BugNote.rawText for #id/mantis#id/bug_id=id patterns, keep issue-ticket IDs, deduplicate, then persist as outbound issue links
    inputs:
      - Issue.hasBugNote->BugNote.rawText
    confirmation: HPO_CONFIRMED
  - name: issue_conclusion_derivation
    target: Issue.conclusion
    rule: AI Agent infers and composes a concise issue conclusion from title/description, bug notes, assignment progression, and final resolution metadata
    inputs:
      - Issue.title
      - Issue.description
      - Issue.hasBugNote->BugNote.rawText
      - Issue.status
      - Issue.resolvedIn
      - Issue.assignedDevId
      - Issue.qaAssigneeId
      - Issue.reportedVersion
      - Issue.earliestBuildNumber
    confirmation: HPO_CONFIRMED

open_confirmations:
  - ActionHistory property/relation source checks pending
  - BranchRequest property/relation source checks pending
  - Branch property/relation source checks pending
  - BuildRequestPage property/relation source checks pending
  - BuildRequest property/relation source checks pending
  - BuildRun property/relation source checks pending
  - Artifact property/relation source checks pending
  - ValidationRecord property/relation source checks pending
  - ReleaseNote property/relation source checks pending
  - Person property/relation source checks pending
  - Team property/relation source checks pending
  - CommunicationThread property/relation source checks pending

      - requestedAt
      - branchName
      - majorVersion
      - minorVersion
      - branchPoint
      - branchType
      - forCustomer
      - top3CaseId
      - productFamily
      - requestorId
      - devLeadId
      - pmLeadId
      - branchSourceCodeUrl
      - branchJobUrl
  - name: Branch
    layer: core
    key: branchName
    properties:
      - branchName
      - productFamily
      - majorVersion
      - minorVersion
      - branchPoint
      - branchType
      - createdAt
      - createdByApp
      - createdByRef
      - lastSyncedAt
      - sourceBranchRequestId
  - name: BuildRequest
    layer: core
    key: buildRequestId
    properties:
      - buildRequestId
      - requestedAt
      - requestStatus
      - gitProject
      - gitRef
      - gitlabUrl
      - branchType
      - patchVersion
      - buildLabel
      - buildLabelOther
      - emailRecipients
      - buildDescription
      - selectedCombinations
      - runDbUpdate
      - appendModelName
      - trial
      - maturity
      - sa
      - saPatchVersion
  - name: BuildRun
    layer: core
    key: buildRunId
    properties:
      - buildRunId
      - buildTag
      - result
      - triggeredAt
      - finishedAt
      - notifiedAt
      - consoleOutputUrl
      - imagesStoreAt
      - notificationRef
  - name: BuildArtifact
    layer: core
    key: artifactId
    properties:
      - artifactId
      - buildRunId
      - top3BuildId
      - name
      - artifactType
      - size
      - lastModifiedAt
      - downloadUrl
      - viewUrl
      - checksumRef
  - name: ValidationRecord
    layer: core
    key: validationId
    properties: [validationId, environment, reproSteps, observedResult, expectedResult, validationStatus, evidenceLink]
  - name: ReleaseNote
    layer: core
    key: releaseNoteId
    properties: [releaseNoteId, content, authorId, createdAt, publishStatus]
  - name: PhabricatorTask
    layer: core
    key: phabTaskId
    properties:
      - phabTaskId
      - phabUrl
      - top3CaseId
      - title
      - status
      - assignedToId
      - updatedAt
      - latestCommentAt
      - latestCommentSummary
      - latestChecklistUrls
      - checklistSyncState
  - name: EmailNotify
    layer: core
    key: emailNotifyId
    properties:
      - emailNotifyId
      - receivedAt
      - sender
      - titleRaw
      - eventType
      - branchName
      - branchSourceCodeUrl
      - branchJobUrl
      - buildNumber
      - imagesStoreAt
      - consoleOutputUrl
      - ticketUrl
  - name: Person
    layer: core
    key: personId
    properties: [personId, name, roleType, email]
  - name: Team
    layer: core
    key: teamId
    properties: [teamId, teamType, channelRef, topic]
  - name: CommunicationThread
    layer: core
    key: threadId
    properties: [threadId, platform, topic, createdAt, lastMessageAt]

  - name: MantisTop3CasePage
    layer: adapter
    key: pageRef
    properties: [pageRef, summary, status, severity, eta, assignedPm, assignedTo, qaAssignee, branchMergeList, nfrField]
  - name: MantisNFRPage
    layer: adapter
    key: pageRef
    properties: [pageRef, product, solution, summary, description, status, reporter, salesforceOppIds]
  - name: MantisIssuePage
    layer: adapter
    key: pageRef
    properties: [pageRef, category, severity, reproducibility, summary, description, status, resolution, assignedTo]
  - name: MantisBugNoteSection
    layer: adapter
    key: sectionRef
    properties: [sectionRef, noteAuthor, noteCreatedAt, noteBody]
  - name: MantisActionHistorySection
    layer: adapter
    key: sectionRef
    properties: [sectionRef, rowId, mergedCol, summaryCol, top3BuildMarker]
  - name: JenkinsBranchRequestFormPage
    layer: adapter
    key: pageRef
    properties: [pageRef, GITLAB_TOP_LEVEL_GROUP, GITLAB_PROJECT, MAJOR_VERSION, MINOR_VERSION, NEW_BRANCH_NAME, BRANCH_POINT, BRANCH_TYPE, BRANCH_DESCRIPTION, FOR_CUSTOMER, DEV_LEAD, PM_LEAD]
  - name: JenkinsBranchProjectPage
    layer: adapter
    key: pageRef
    properties: [pageRef, devLead, pmLead, branchType, description, createdAt, initialBranchPoint, repositoryUrls, buildHistory]
  - name: JenkinsBuildWithParametersPage
    layer: adapter
    key: pageRef
    properties: [pageRef, GIT_PROJECT, GIT_REF, GITLAB_URL, PATCH_VERSION, BUILD_LABEL, EMAIL_RECIPIENTS, BUILD_DESCRIPTION, MATRIX, RUN_DB_UPDATE, TRIAL, SA]
  - name: OutlookBranchRequestEmail
    layer: adapter
    key: messageRef
    properties: [messageRef, title, branchName, version, branchType, branchPoint, requestor, devLead, pmLead, forCustomer, top3CaseId]
  - name: OutlookBranchApprovedEmail
    layer: adapter
    key: messageRef
    properties: [messageRef, title, branchName, sourceCodeUrl, jenkinsJobUrl]
  - name: OutlookBuildNotifyEmail
    layer: adapter
    key: messageRef
    properties: [messageRef, title, result, buildNumber, consoleUrl, infositeUrl, sender, receivedAt]
  - name: InfoSiteBuildFolderPage
    layer: adapter
    key: pageRef
    properties: [pageRef, folderPath, fileName, lastModified, size, actions]
  - name: PhabricatorTaskPage
    layer: adapter
    key: pageRef
    properties: [pageRef, taskId, title, status, assignee, mantisIds, checklistLinks, timeline]
  - name: TeamsCoreThreadView
    layer: adapter
    key: threadRef
    properties: [threadRef, topic, participants, messages, messageTime]


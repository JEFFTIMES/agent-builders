link_keys:
  - Top3Case.caseId = Mantis bug_id
  - NFR.nfrId = Mantis bug_id of NFR ticket
  - Issue.issueId = Mantis bug_id of issue ticket
  - BranchRequest.branchName + requestedAt = deterministic request identity fallback
  - Branch.branchName = canonical branch key across Jenkins/Email/Mantis
  - BuildRun.buildRunId = Jenkins job path + build number
  - BuildArtifact.artifactId = BuildRun.buildRunId + artifact file name
  - PhabricatorTask.phabTaskId = task id T<id>
  - Person.personId = normalized corporate account id token
  - EmailNotify.emailNotifyId = message-id fallback to normalized subject + receivedAt

adapter_field_mappings:
  - adapter: MantisTop3CasePage
    field: Status
    canonical: Top3Case.status
    policy: agent_managed
  - adapter: MantisTop3CasePage
    field: Branch Merge List
    canonical: Top3Case.branch
    policy: agent_managed
  - adapter: MantisNFRPage
    field: Solution
    canonical: NFR.solutionRaw
    policy: agent_managed
  - adapter: MantisIssuePage
    field: Assigned To
    canonical: Issue.assignedDevId
    policy: agent_managed
  - adapter: JenkinsBranchRequestFormPage
    field: NEW_BRANCH_NAME
    canonical: BranchRequest.branchName
    policy: agent_managed
  - adapter: JenkinsBuildWithParametersPage
    field: MATRIX
    canonical: BuildRequest.selectedCombinations
    policy: agent_managed
  - adapter: OutlookBranchApprovedEmail
    field: Jenkins Job URL
    canonical: BranchRequest.branchJobUrl
    policy: system_sync_only
  - adapter: OutlookBuildNotifyEmail
    field: Console Output URL
    canonical: BuildRun.consoleOutputUrl
    policy: system_sync_only
  - adapter: InfoSiteBuildFolderPage
    field: file rows
    canonical: BuildArtifact.*
    policy: system_sync_only

derivation_rules:
  - name: top3case_closure_reason_derivation
    target: Top3Case.closureReason
    rule: infer closure rationale from final status + release/close notes + validation evidence
  - name: top3case_phase_derivation
    target: Top3Case.currentPhase
    rule: classify phase from status, action history, build and validation signals
  - name: nfr_solution_tags_derivation
    target: NFR.solutionTags
    rule: split solutionRaw by comma and normalize
  - name: nfr_references_derivation
    target: NFR.referredIssueIds, NFR.referredNfrIds
    rule: parse bugnotes and description for ticket reference patterns
  - name: issue_references_derivation
    target: Issue.referredIssueIds, Issue.referredNfrIds
    rule: parse issue bugnotes for ticket reference patterns
  - name: patch_main_branch_derivation
    target: Patch.mainBranchPointRaw, Patch.mainBranchPoint, Patch.mergeToMainState
    rule: derive branchpoint and merge state from linked Issue.resolvedIn
  - name: email_event_type_derivation
    target: EmailNotify.eventType
    rule: classify event from sender + subject + body patterns
  - name: build_artifact_type_derivation
    target: BuildArtifact.artifactType
    rule: infer artifact type from file naming patterns and extension

open_confirmations:
  - Build failure `.msg` extraction remains parser-dependent; current graph uses stable headers/URLs only.

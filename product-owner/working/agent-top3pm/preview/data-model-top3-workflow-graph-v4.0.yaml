model:
  name: top3_workflow
  version: v4.0
  format: graph_friendly_layered
  source_of_truth:
    - working/agent-top3pm/preview/data-model-core-top3-workflow-v4.0.md
    - working/agent-top3pm/preview/data-model-adapter-top3-workflow-v4.0.md

entities:
  - name: ProductFamily
    layer: core
    key: productFamilyId
    properties: [productFamilyId, name]
  - name: Top3Case
    layer: core
    key: caseId
    properties:
      - caseId
      - title
      - caseCategory
      - status
      - severity
      - eta
      - createdAt
      - updatedAt
      - description
      - customerName
      - pmOwnerId
      - qaOwnerId
      - devOwnerId
      - supportOwnerIds
      - branch
      - hardwareModels
      - caseSummary
      - currentPhase
      - closedAt
      - closureReason
  - name: NFR
    layer: core
    key: nfrId
    properties:
      - nfrId
      - product
      - solutionRaw
      - solutionTags
      - summary
      - description
      - status
      - severity
      - reporterId
      - dateSubmitted
      - lastUpdate
      - eta
      - affectedCustomer
      - salesforceOppIds
      - salesforceAccountIds
      - additionalInformation
      - duplicateNfrId
      - referredNfrIds
      - referredIssueIds
      - conclusion
  - name: Issue
    layer: core
    key: issueId
    properties:
      - issueId
      - title
      - description
      - status
      - severity
      - category
      - reproducibility
      - reporterId
      - assignedDevId
      - qaAssigneeId
      - reproducedById
      - reportedVersion
      - earliestBuildNumber
      - resolvedIn
      - fixSchedule
      - duplicateIssueId
      - referredIssueIds
      - referredNfrIds
      - conclusion
  - name: BugNote
    layer: core
    key: bugNoteId
    properties:
      - bugNoteId
      - parentTicketId
      - authorId
      - createdAt
      - headlineRaw
      - headlineType
      - rawText
      - mentionedTicketIds
      - phabTaskIds
      - extractAt
  - name: ActionHistory
    layer: core
    key: actionHistoryId
    properties: [actionHistoryId, parentCaseId, sourceSystem, sourceSection]
  - name: Top3Build
    layer: core
    key: top3BuildId
    properties: [top3BuildId, buildNumber, buildQualifier, sequenceNo, sourceSystem]
  - name: Patch
    layer: core
    key: patchId
    properties:
      - patchId
      - top3BuildId
      - issueId
      - issueTitle
      - mainBranchPointRaw
      - mainBranchPoint
      - mergeToMainState
